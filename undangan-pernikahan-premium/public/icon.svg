<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B89A56" />
      <stop offset="30%" stop-color="#F5E5C9" />
      <stop offset="70%" stop-color="#D6C19A" />
      <stop offset="100%" stop-color="#B89A56" />
    </linearGradient>
  </defs>
  <!-- Royal Background -->
  <rect width="100%" height="100%" fill="#F8F6F2" rx="100" />
  
  <!-- Outer Gold Border -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="url(#goldGrad)" stroke-width="6" />
  <rect x="36" y="36" width="440" height="440" rx="68" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="8 6" opacity="0.8" />

  <!-- Gunungan Javanese Silhouette -->
  <g transform="translate(256, 240) scale(2.8)">
    <!-- Gunungan Shape -->
    <path d="M 0 -60 Q 25 -15 35 15 Q 37 25 30 35 Q 25 40 0 40 Q -25 40 -30 35 Q -37 25 -35 15 Q -25 -15 0 -60 Z" 
          fill="rgba(184, 154, 86, 0.08)" stroke="url(#goldGrad)" stroke-width="1.5" />
          
    <!-- Tree of Life -->
    <line x1="0" y1="40" x2="0" y2="-20" stroke="url(#goldGrad)" stroke-width="2.5" />
    <path d="M 0 20 Q 15 15 25 5" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
    <path d="M 0 20 Q -15 15 -25 5" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
    <path d="M 0 5 Q 18 0 22 -15" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
    <path d="M 0 5 Q -18 0 -22 -15" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
    
    <!-- Central Gate -->
    <path d="M -10 40 L -10 25 L 10 25 L 10 40" stroke="url(#goldGrad)" stroke-width="1.5" fill="rgba(184, 154, 86, 0.15)" />
    <path d="M -12 25 L 0 15 L 12 25" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />
  </g>
  
  <!-- Initials A & A -->
  <text x="256" y="420" font-family="'Cormorant Garamond', 'Lora', serif" font-size="54" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">A &amp; A</text>
</svg>
